name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Delete old APK artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[] | select(.name == "app-debug") | .id' | while read artifact_id; do
          if [ -n "$artifact_id" ]; then
            echo "Deleting old app-debug artifact: $artifact_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
          fi
        done

    - name: Decode Keystore
      run: |
        if [ ! -f debug.keystore.base64 ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        else
          python3 -c "import base64; open('debug.keystore', 'wb').write(base64.b64decode(open('debug.keystore.base64', 'r').read()))"
        fi

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Build with Gradle Wrapper
      run: ./gradlew clean assembleDebug --stacktrace --no-configuration-cache

    - name: Upload APK
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 1
        overwrite: true
        compression-level: 0
        if-no-files-found: error
