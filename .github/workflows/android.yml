name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Delete old APK artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[] | select(.name == "app-release" or .name == "app-debug-test-only") | .id' | while read artifact_id; do
            if [ -n "$artifact_id" ]; then
              echo "Deleting old APK artifact: $artifact_id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
            fi
          done

      - name: Decode release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build release APK
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --stacktrace --no-configuration-cache

      - name: Build debug APK fallback
        if: env.HAS_RELEASE_KEYSTORE != 'true'
        run: ./gradlew clean assembleDebug --stacktrace --no-configuration-cache

      - name: Upload release APK
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload debug APK fallback
        if: env.HAS_RELEASE_KEYSTORE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-test-only
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
          if-no-files-found: error
